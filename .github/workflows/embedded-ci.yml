name: Embedded Linux CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install ARMv8 Toolchain & Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu make qemu-system-arm linux-headers-$(uname -r)

    - name: Build IPC Applications
      run: |
        # IPC binaries rely on POSIX shm and semaphores, handled by the Makefile
        make ipc
        
    - name: Verify IPC Binaries
      run: |
        file build/logger_app | grep "aarch64"
        file build/sensor_reader | grep "aarch64"

    - name: Build Kernel Module (Host Architecture Check)
      run: |
        # For CI purposes, we do a syntax & build check of the LKM against the runner's Linux kernel.
        # Note: We override CROSS_COMPILE to empty so it builds for x86_64 host just to test C syntax and kernel APIs.
        make driver CROSS_COMPILE="" ARCH="x86" KERNEL_DIR="/lib/modules/$(uname -r)/build"

    - name: Prepare Minimal RootFS Structure
      run: |
        make rootfs
        ls -la build/rootfs/bin/

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: embedded-binaries
        path: |
          build/logger_app
          build/sensor_reader
          source_code/driver/telemetry_sensor.ko
